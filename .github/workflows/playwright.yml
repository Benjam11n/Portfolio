name: Playwright

on:
  push:
    branches: ["main", "master"]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright Suites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_ARTIFACTS_DIR: /tmp/portfolio-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        run: pnpm --filter web test:e2e -- navigation.test.ts contact-form.test.ts

      - name: Run homepage performance test
        id: homepage
        continue-on-error: true
        run: pnpm --filter web test:e2e -- homepage-performance.test.ts

      - name: Upload Playwright Report
        if: ${{ steps.e2e.outcome == 'failure' || steps.homepage.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: |
            /tmp/portfolio-playwright/playwright-report
            /tmp/portfolio-playwright/test-results
          if-no-files-found: ignore

      - name: Fail if any Playwright suite failed
        if: ${{ steps.e2e.outcome == 'failure' || steps.homepage.outcome == 'failure' }}
        run: exit 1
