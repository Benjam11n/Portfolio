name: Playwright Homepage

on:
  push:
    branches: ["main", "master"]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  homepage-performance:
    name: Homepage Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_ARTIFACTS_DIR: /tmp/portfolio-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Homepage Performance Test
        run: pnpm --filter web test:e2e -- homepage-performance.test.ts

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-homepage-report
          path: |
            /tmp/portfolio-playwright/playwright-report
            /tmp/portfolio-playwright/test-results
          if-no-files-found: ignore
